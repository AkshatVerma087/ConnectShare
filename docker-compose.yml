services:
  app:
    build:
      context: .
      target: app
    image: connectshare-app:local
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      APP_KEY: ${APP_KEY:?Set APP_KEY in .env or export it before running docker compose}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: connectshare
      DB_USERNAME: connectshare
      DB_PASSWORD: connectshare
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: sync
      FILESYSTEM_DISK: public
      VITE_APP_NAME: ConnectShare
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - connectshare-storage:/var/www/html/storage
      - connectshare-bootstrap-cache:/var/www/html/bootstrap/cache
    networks:
      - connectshare

  web:
    build:
      context: .
      target: web
    image: connectshare-web:local
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - connectshare-storage:/var/www/html/storage:ro
      - connectshare-bootstrap-cache:/var/www/html/bootstrap/cache:ro
    networks:
      - connectshare

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: connectshare
      POSTGRES_USER: connectshare
      POSTGRES_PASSWORD: connectshare
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connectshare -d connectshare"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - connectshare-db:/var/lib/postgresql/data
    networks:
      - connectshare

  # Run migrations manually: docker compose run --rm migrate
  migrate:
    image: connectshare-app:local
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY:?Set APP_KEY in .env or export it before running docker compose}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: connectshare
      DB_USERNAME: connectshare
      DB_PASSWORD: connectshare
    entrypoint: ["php"]
    command: ["artisan", "migrate", "--force"]
    profiles:
      - init
    networks:
      - connectshare

volumes:
  connectshare-storage:
  connectshare-bootstrap-cache:
  connectshare-db:

networks:
  connectshare:
    driver: bridge