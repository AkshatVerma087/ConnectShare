; ──────────────────────────────────────────────
; PHP-FPM pool overrides for Railway
; ──────────────────────────────────────────────
[www]
; Listen on localhost TCP instead of Unix socket (simpler for single-container)
listen = 127.0.0.1:9000

; Dynamic process management for Railway's resource limits
pm = dynamic
pm.max_children = 15
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 5
pm.max_requests = 500

; Send logs to stderr so Railway captures them
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /dev/stderr
catch_workers_output = yes
decorate_workers_output = no
